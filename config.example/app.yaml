# Réglages globaux de l'application (édité à la main)
title: GopDash

# Authentification basique (optionnelle)
auth:
  enabled: false
  username: admin
  password: changeme

# Intervalle de rafraîchissement des métriques live (secondes)
refresh_interval: 5

# Thème : mode = light | dark | system ; preset = default | ocean | forest | rose
theme:
  mode: system
  preset: rose

settings:
  # true : les déplacements de widgets sont écrits dans config/layout.yaml
  persist_layout: true
  locale: fr-FR
  timezone: Europe/Paris
  # Grille Gridstack (colonnes × hauteur de cellule en px)
  grid:
    columns: 24
    cell_height: 15
