# Sources de données alimentant les widgets (édité à la main).

weather:
  default_location: Paris,FR  # utilisé si le widget météo n'a pas de location
  units: metric
  show_forecast: true           # prévisions sur 5 jours (surcharge possible par widget)

docker:
  socket_path: /var/run/docker.sock
  refresh_hours: 4   # vérif. auto des mises à jour d'images (widget docker-updates)

bookmarks:
  - id: infrastructure
    title: Infrastructure
    links:
      - name: Proxmox
        url: https://proxmox.local
        icon: sh:proxmox
        description: Hyperviseur
      - name: Portainer
        url: https://portainer.local
        icon: sh:portainer
        description: Docker UI
  - id: media
    title: Media
    links:
      - name: Jellyfin
        url: https://xxx.xxx.com
        icon: sh:jellyfin
        description: Streaming
        health_check: true
      - name: Radarr
        url: https://xxx.xxx.com
        icon: sh:radarr
        health_check: true
      - name: Sonarr
        url: https://xxx.xxx.com
        icon: sh:sonarr
        health_check: true
      - name: Jackett
        url: https://jackett.local:9117/
        icon: sh:jackett
        health_check: true
        health_url: https://jackett.local:9117/UI/Login
        expected_status: 302
      - name: qBittorrent
        url: https://qbittorrent.local
        description: Torrents

rss:
  - id: tech
    url: https://hnrss.org/frontpage
    refresh_minutes: 15
  - id: selfhosted
    url: https://hnrss.org/newest?q=selfhosted
    refresh_minutes: 30

# API Jellyfin pour le widget jellyfin (clé : Dashboard → API Keys)
jellyfin:
  url: https://flix.local
  api_key: "******"   # à renseigner
  # insecure: true   # certificats auto-signés

search_engines:
  - id: google
    name: Google
    url: https://www.google.com/search?q={query}
    icon: sh:google
  - id: duckduckgo
    name: DuckDuckGo
    url: https://duckduckgo.com/?q={query}
  - id: bing
    name: Bing
    url: https://www.bing.com/search?q={query}
  - id: qwant
    name: Qwant
    url: https://www.qwant.com/?q={query}
  - id: brave
    name: Brave
    url: https://search.brave.com/search?q={query}
