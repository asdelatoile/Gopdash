# Définition des widgets du dashboard (édité à la main).
# Les positions (x/y/w/h) sont gérées dans config/layout.yaml.
#
# icon : lucide:<nom> | sh:<nom> (selfh.st) | /icons/<fichier> | https://...
widgets:
  - type: system
    id: system-1
    title: Serveur
    icon: lucide:server

  - type: weather
    id: weather-1
    title: Météo
    icon: lucide:cloud-sun
    # location: Lyon,FR   # optionnel — défaut = services.yaml → weather.default_location

  # - type: weather
  #   id: weather-2
  #   title: Météo
  #   icon: lucide:cloud-sun
  #   location: Lyon,FR   # optionnel — défaut = services.yaml → weather.default_location
  #   show_forecast: false

  - type: calendar
    id: calendar-1
    title: Calendrier
    icon: lucide:calendar
    show_header: false
    show_today: false
    show_outside_days: true
    show_navigation: true

  - type: search
    id: search-1
    title: Recherche
    icon: lucide:search
    engine: duckduckgo   # id dans services.yaml → search_engines
    target: same-tab      # new-tab | same-tab

  - type: docker
    id: docker-1
    title: Containers
    icon: lucide:container
    containers:
      - gopdash
      - webserver
    show_all: false
    # group_by: flat | compose ; collapse_groups replie les stacks Compose
    group_by: compose
    collapse_groups: true

  - type: bookmarks
    id: bookmarks-media
    title: Media
    icon: lucide:video
    group: Media

  - type: bookmarks
    id: bookmarks-infra
    title: Infrastructure
    icon: lucide:network
    group: Infrastructure

  - type: rss
    id: rss-tech
    title: Hacker News
    icon: lucide:newspaper
    feed: tech
    max_items: 8

  - type: rss
    id: rss-selfhosted
    title: Self-hosted
    icon: lucide:rss
    feed: selfhosted
    max_items: 8
    show_header: false
